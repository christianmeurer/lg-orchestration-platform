name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-python:
    name: "Python Lint & Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install "uv>=0.5,<1"

      - name: Install dependencies
        working-directory: py
        run: uv sync --dev

      - name: ruff check
        working-directory: py
        run: uv run ruff check .

      - name: ruff format check
        working-directory: py
        run: uv run ruff format --check .

      - name: mypy
        working-directory: py
        run: uv run python -m mypy src/

  test-python:
    name: "Python Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install "uv>=0.5,<1"

      - name: Install dependencies
        working-directory: py
        run: uv sync --dev

      - name: Run pytest
        working-directory: py
        run: uv run pytest tests/ -x -q --tb=short --cov=lg_orch --cov-fail-under=84

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: py/coverage.xml
          if-no-files-found: ignore

  lint-rust:
    name: "Rust Lint & Format Check"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Set stable as default toolchain
        run: rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: cargo fmt check
        working-directory: rs
        run: cargo +nightly fmt --all -- --check

      - name: cargo clippy
        working-directory: rs
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test-rust:
    name: "Rust Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: cargo test
        working-directory: rs
        run: cargo test --all-features --locked

  security-audit:
    name: "Security Audit (cargo-deny + pip-audit)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-python, lint-rust]
    steps:
      - uses: actions/checkout@v4

      - name: Cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rs/Cargo.toml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install "uv>=0.5,<1"

      - name: pip-audit
        working-directory: py
        run: uv run pip-audit --skip-editable

  build-guest-rootfs:
    name: "Build Firecracker Guest Rootfs"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.ref == 'refs/heads/master' || contains(github.event.head_commit.modified, 'rs/guest-agent/') }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build guest rootfs
        run: bash scripts/build_guest_rootfs.sh
      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: firecracker-rootfs
          path: artifacts/rootfs.ext4
          if-no-files-found: error

  build-spa:
    name: "Build Leptos WASM SPA"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-rust]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rs -> rs/target"

      - name: Install trunk
        run: curl -sSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz && sudo mv trunk /usr/local/bin/

      - name: Build SPA
        working-directory: rs/spa-leptos
        run: trunk build --release

      - name: Upload SPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: rs/spa-leptos/dist/
          retention-days: 1

  eval-canary:
    name: "Eval Canary Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-python, test-rust, build-spa]
    steps:
      - uses: actions/checkout@v4

      - name: Download SPA artifact
        uses: actions/download-artifact@v4
        with:
          name: spa-dist
          path: rs/spa-leptos/dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install "uv>=0.5,<1"

      - name: Install dependencies
        working-directory: py
        run: uv sync --dev

      - name: Run canary eval (dry-run)
        working-directory: py
        env:
          LG_DRY_RUN: "true"
        run: |
          if uv run python ../eval/run.py --help 2>&1 | grep -q -- '--dry-run'; then
            uv run python ../eval/run.py --tasks canary --dry-run
          else
            echo "canary smoke skipped"
          fi
