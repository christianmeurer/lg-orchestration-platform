name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: "Python Lint & Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: py
        run: uv sync --dev

      - name: ruff check
        working-directory: py
        run: uv run ruff check .

      - name: ruff format check
        working-directory: py
        run: uv run ruff format --check .

      - name: mypy
        working-directory: py
        run: uv run mypy src/

  test-python:
    name: "Python Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: py
        run: uv sync --dev

      - name: Run pytest
        working-directory: py
        run: uv run pytest tests/ -x -q --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: py/coverage.xml
          if-no-files-found: ignore

  lint-rust:
    name: "Rust Lint & Format Check"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: cargo fmt check
        working-directory: rs
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: rs
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-rust:
    name: "Rust Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: cargo test
        working-directory: rs
        run: cargo test --all-features

  eval-canary:
    name: "Eval Canary Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-python, test-rust]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: py
        run: uv sync --dev

      - name: Run canary eval (dry-run)
        working-directory: py
        env:
          LG_DRY_RUN: "true"
        run: |
          if uv run python ../eval/run.py --help 2>&1 | grep -q -- '--dry-run'; then
            uv run python ../eval/run.py --task ../eval/tasks/canary.json --dry-run
          else
            echo "canary smoke skipped"
          fi
