# Secrets required:
#   DIGITALOCEAN_ACCESS_TOKEN — DO API token with registry read/write access
#   DO_REGISTRY_NAME          — DigitalOcean registry name (e.g. lula-registry)

name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  security-gate:
    name: "Security Gate (cargo-deny)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rs/Cargo.toml

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install "uv>=0.5,<1"

      - name: Install Python dependencies
        working-directory: py
        run: uv sync --dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: Python tests
        working-directory: py
        run: uv run pytest -x -q

      - name: Rust tests
        working-directory: rs
        run: cargo test --all --locked

  build-guest-rootfs:
    name: "Build Firecracker Guest Rootfs"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build guest rootfs
        run: bash scripts/build_guest_rootfs.sh
      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: firecracker-rootfs
          path: artifacts/rootfs.ext4
          if-no-files-found: error
      - name: Attach rootfs.ext4 to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/rootfs.ext4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    name: "Build, Push & Scan"
    runs-on: ubuntu-latest
    needs: [test, build-guest-rootfs]
    timeout-minutes: 30

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/lula
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  update-manifests:
    name: "Update K8s Manifests"
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Pin image digest in deployment manifest
        run: |
          yq -i '.spec.template.spec.containers[0].image = "registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/lula@${{ needs.build-and-push.outputs.image_digest }}"' infra/k8s/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/deployment.yaml
          git commit -m "chore(deploy): update image digest to ${{ github.ref_name }}"
          git push
