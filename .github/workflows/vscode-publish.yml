name: VS Code Extension — Publish

on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: vscode-extension

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node esbuild.js --production

      - name: Package VSIX
        run: npx @vscode/vsce package --no-yarn

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lula-vscode-extension
          path: vscode-extension/*.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        run: npx @vscode/vsce publish --no-yarn
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        run: npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true
