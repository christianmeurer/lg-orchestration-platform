[advisories]
version = 2
# All advisories without an explicit ignore entry are denied by default in v2.
# Add RUSTSEC IDs here only to suppress known false-positives.
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "OpenSSL",
    "CC0-1.0",
    "Zlib",
]
# Any license not in the allow list above is denied.
# Copyleft licenses (GPL, LGPL, AGPL, MPL, etc.) are therefore blocked.
deny = []
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
