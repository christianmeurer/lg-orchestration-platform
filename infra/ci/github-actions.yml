# Required secrets for e2e-smoke job:
#   MODEL_ACCESS_KEY          — DigitalOcean or compatible model API key
#   OPENAI_COMPATIBLE_API_KEY — Optional: OpenAI-compatible endpoint key
#   LG_REMOTE_API_BEARER_TOKEN — Optional: Remote API bearer token for integration tests
#
# The e2e-smoke job is skipped automatically when MODEL_ACCESS_KEY is not set
# (e.g. on forks or PRs from external contributors).
name: CI

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --project ./py --python 3.12
      - name: Lint (ruff)
        run: cd py && uv run ruff check src/ tests/
      - name: Type check (mypy)
        run: cd py && uv run mypy src/
      - name: Test
        run: cd py && uv run pytest tests/ -x -q --tb=short

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Clippy
        run: cd rs && cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cd rs && cargo test --all
      - name: Format check
        run: cd rs && cargo fmt --check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build combined image
        run: docker build -t lg-orch:ci .
      - name: Build Python-only image
        run: docker build -f Dockerfile.python -t lg-orch-python:ci .

  e2e-smoke:
    runs-on: ubuntu-latest
    if: ${{ secrets.MODEL_ACCESS_KEY != '' }}
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --project ./py --python 3.12
      - name: E2E smoke (live model)
        env:
          LG_E2E: "1"
          LG_PROFILE: dev
          MODEL_ACCESS_KEY: ${{ secrets.MODEL_ACCESS_KEY }}
          DIGITAL_OCEAN_MODEL_ACCESS_KEY: ${{ secrets.MODEL_ACCESS_KEY }}
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          LG_REMOTE_API_BEARER_TOKEN: ${{ secrets.LG_REMOTE_API_BEARER_TOKEN }}
        run: cd py && uv run pytest tests/test_e2e.py -v --tb=short
