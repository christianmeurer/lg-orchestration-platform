apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: lula-secret-store
  namespace: default
spec:
  provider:
    # Configure for your provider. Example for AWS Secrets Manager:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: lula-orch
