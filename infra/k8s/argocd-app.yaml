# ArgoCD Application manifest for the Lula platform.
# set REPO_URL before applying — or use scripts/argocd_bootstrap.sh which substitutes it automatically.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lula
  namespace: argocd
  annotations:
    # Substitute REPLACE_WITH_REPO_URL with the actual Git remote before kubectl apply.
    argocd.argoproj.io/sync-wave: "0"
    # ArgoCD Image Updater: track the lula image using semver strategy
    argocd-image-updater.argoproj.io/image-list: "lula=registry.digitalocean.com/lula-orch/lula-orch"
    argocd-image-updater.argoproj.io/lula.update-strategy: semver
    argocd-image-updater.argoproj.io/lula.semver-constraint: ">=1.0.0"
    argocd-image-updater.argoproj.io/lula.pull-secret: pullsecret:lula-orch/docr-secret
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  # NOTE: Sync windows are configured at the AppProject level.
  # See infra/k8s/argocd-project.yaml for production sync window configuration.
  project: lula

  source:
    repoURL: REPLACE_WITH_REPO_URL
    targetRevision: main
    path: infra/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: lula-orch

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground

  # Prevent ArgoCD from treating managed-field / status drift as an out-of-sync condition.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /status
        - /spec/metrics
