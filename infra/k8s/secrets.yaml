# WARNING: Replace all REPLACE_ME values with real secrets before applying.
# Do NOT commit real secrets to source control.
# Apply with: kubectl apply -f infra/k8s/secrets.yaml -n lula-orch
apiVersion: v1
kind: Secret
metadata:
  name: lula-secrets
  namespace: lula-orch
type: Opaque
stringData:
  LG_REMOTE_API_BEARER_TOKEN: "REPLACE_ME"
  LG_RUNNER_API_KEY: "REPLACE_ME"
  DIGITAL_OCEAN_MODEL_ACCESS_KEY: "REPLACE_ME"
  MODEL_ACCESS_KEY: "REPLACE_ME"
