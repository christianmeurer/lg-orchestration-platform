apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runner-network-policy
  namespace: lula-orch
spec:
  podSelector:
    matchLabels:
      app: lula-runner
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: lula-orch
      ports:
        - protocol: TCP
          port: 8088
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: lula-orch
      ports:
        - protocol: TCP
          port: 8001
---
# NetworkPolicy for the lula-orch orchestrator.
#
# Egress design decisions:
#   - DNS (53/udp+tcp) to kube-system is always required for service discovery.
#   - LLM provider egress is allowed to 0.0.0.0/0 on TCP 443 because model
#     endpoints (OpenAI, Anthropic, Azure OpenAI, etc.) use dynamic IPs and CDNs.
#     In hardened deployments this CIDR should be narrowed to known provider
#     IP ranges once they are stable (e.g. via an egress firewall or FQDN policy).
#   - Internal Redis (6379) and Postgres (5432) are scoped to the same namespace.
#   - Communication to lula-runner is scoped by pod label on TCP 8088.
#   - OTLP telemetry (4317 gRPC / 4318 HTTP) is scoped to the same namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orch-network-policy
  namespace: lula-orch
spec:
  podSelector:
    matchLabels:
      app: lula-orch
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8001
  egress:
    # DNS resolution via kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # LLM provider APIs (external HTTPS).
    #
    # Why 0.0.0.0/0 on 443?
    #   LLM inference endpoints from major providers use anycast addresses,
    #   CDN edge nodes, and frequently-rotated IP ranges that cannot be
    #   enumerated reliably at deploy time.  A blanket CIDR is therefore the
    #   pragmatic default; the trade-off is accepted knowingly.
    #
    # Providers currently covered by this rule:
    #   - Anthropic Claude      — api.anthropic.com
    #   - OpenAI / Azure OpenAI — api.openai.com, <region>.openai.azure.com
    #   - DigitalOcean AI       — inference.do-ai.run
    #   - Any OpenAI-compatible proxy reachable over public HTTPS
    #
    # Port 25061 is used by DigitalOcean managed database connection poolers
    # (PgBouncer) that may be required for external Postgres access.
    #
    # Hardening guidance:
    #   In environments that support FQDN-based egress policy (e.g. Cilium
    #   NetworkPolicy with DNS-aware rules, or an external egress firewall),
    #   replace this ipBlock with explicit FQDN entries for each provider and
    #   remove port 25061 if managed databases are in-cluster.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 25061
    # Internal Redis
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
    # Internal Postgres
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    # lula-runner service
    - to:
        - podSelector:
            matchLabels:
              app: lula-runner
      ports:
        - protocol: TCP
          port: 8088
    # OTLP telemetry collector (gRPC + HTTP)
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
