apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-installer
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: gvisor-installer
  template:
    metadata:
      labels:
        app: gvisor-installer
    spec:
      nodeSelector:
        sandbox: gvisor
      tolerations:
        - key: sandbox
          operator: Equal
          value: gvisor
          effect: NoSchedule
      initContainers:
        - name: installer
          image: ubuntu:22.04
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq curl util-linux
              curl -fsSL https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/runsc \
                -o /host/usr/local/sbin/runsc
              chmod 755 /host/usr/local/sbin/runsc
              if ! grep -q 'io.containerd.runsc.v1' /host/etc/containerd/config.toml 2>/dev/null; then
                cat >> /host/etc/containerd/config.toml <<'EOF'

                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]
                  runtime_type = "io.containerd.runsc.v1"
              EOF
              fi
              echo "gVisor runtime binary installed on the host at /usr/local/sbin/runsc."
              echo "containerd config updated on the host; automatic containerd restart is intentionally skipped."
              echo "Restart containerd out-of-band on this node after the pod finishes init to activate the runsc runtime without leaving the installer pod in Init:Unknown."
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          command: ["/pause"]
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
