apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-installer
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: gvisor-installer
  template:
    metadata:
      labels:
        app: gvisor-installer
    spec:
      nodeSelector:
        sandbox: gvisor
      tolerations:
        - key: sandbox
          operator: Equal
          value: gvisor
          effect: NoSchedule
      initContainers:
        - name: installer
          image: ubuntu:22.04
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq curl
              curl -fsSL https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/runsc \
                -o /host/usr/local/sbin/runsc
              chmod 755 /host/usr/local/sbin/runsc
              if ! grep -q 'io.containerd.runsc.v1' /host/etc/containerd/config.toml 2>/dev/null; then
                cat >> /host/etc/containerd/config.toml <<'EOF'

                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]
                  runtime_type = "io.containerd.runsc.v1"
              EOF
              fi
              chroot /host /bin/sh -c '
                set -eu
                if command -v systemctl >/dev/null 2>&1; then
                  systemctl restart containerd
                elif command -v service >/dev/null 2>&1; then
                  service containerd restart
                else
                  echo "containerd restart requires systemctl or service on the host" >&2
                  exit 1
                fi
              '
      containers:
        - name: pause
          image: gcr.io/pause:3.9
          command: ["/pause"]
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
