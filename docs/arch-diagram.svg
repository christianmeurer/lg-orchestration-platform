<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="8" fill="#0d1117"/>

  <!-- Swim-lane labels -->
  <text x="16" y="28" fill="#3fb950" font-size="11" font-weight="bold">ORCHESTRATION</text>
  <line x1="16" y1="34" x2="884" y2="34" stroke="#21262d" stroke-width="1"/>
  <text x="16" y="200" fill="#3fb950" font-size="11" font-weight="bold">ISOLATION</text>
  <line x1="16" y1="206" x2="884" y2="206" stroke="#21262d" stroke-width="1"/>

  <!-- Row 1: Main pipeline -->

  <!-- User Prompt -->
  <rect x="20" y="55" width="120" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="80" y="78" fill="#e6edf3" font-size="11" text-anchor="middle">User</text>
  <text x="80" y="93" fill="#e6edf3" font-size="11" text-anchor="middle">Prompt</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="80" x2="172" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LangGraph Orchestrator -->
  <rect x="175" y="55" width="170" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="260" y="78" fill="#e6edf3" font-size="11" text-anchor="middle">LangGraph</text>
  <text x="260" y="93" fill="#e6edf3" font-size="11" text-anchor="middle">Orchestrator</text>

  <!-- Arrow 2 -->
  <line x1="345" y1="80" x2="377" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Rust Runner -->
  <rect x="380" y="55" width="155" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="457" y="78" fill="#e6edf3" font-size="11" text-anchor="middle">Rust Runner</text>
  <text x="457" y="93" fill="#8b949e" font-size="10" text-anchor="middle">(axum)</text>

  <!-- Arrow 3 -->
  <line x1="535" y1="80" x2="567" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Firecracker microVM -->
  <rect x="570" y="55" width="155" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="647" y="78" fill="#e6edf3" font-size="11" text-anchor="middle">Firecracker</text>
  <text x="647" y="93" fill="#e6edf3" font-size="11" text-anchor="middle">microVM</text>

  <!-- Arrow 4 -->
  <line x1="725" y1="80" x2="757" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Guest Agent -->
  <rect x="760" y="55" width="120" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="820" y="78" fill="#e6edf3" font-size="11" text-anchor="middle">Guest</text>
  <text x="820" y="93" fill="#e6edf3" font-size="11" text-anchor="middle">Agent</text>

  <!-- Downward arrow from Orchestrator to Approval Gate -->
  <line x1="260" y1="105" x2="260" y2="132" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Approval Gate -->
  <rect x="195" y="135" width="130" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="260" y="162" fill="#e6edf3" font-size="11" text-anchor="middle">Approval Gate</text>

  <!-- Downward arrow from Rust Runner to gVisor -->
  <line x1="457" y1="105" x2="457" y2="132" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- gVisor pod -->
  <rect x="380" y="135" width="155" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="457" y="153" fill="#e6edf3" font-size="11" text-anchor="middle">gVisor pod</text>
  <text x="457" y="168" fill="#8b949e" font-size="10" text-anchor="middle">(runsc)</text>

  <!-- Downward arrow from gVisor to cgroup -->
  <line x1="457" y1="179" x2="457" y2="218" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- cgroup v2 limits -->
  <rect x="380" y="221" width="155" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="457" y="248" fill="#e6edf3" font-size="11" text-anchor="middle">cgroup v2 limits</text>

  <!-- Tier annotations -->
  <text x="600" y="152" fill="#3fb950" font-size="10">Tier 1: VM boundary</text>
  <text x="600" y="248" fill="#3fb950" font-size="10">Tier 2: kernel intercept</text>
  <text x="600" y="268" fill="#3fb950" font-size="10">Tier 3: resource caps</text>

  <!-- Legend line -->
  <text x="20" y="305" fill="#8b949e" font-size="10">Arrows denote request flow. Isolation tiers stack: cgroup v2 ⊂ gVisor ⊂ Firecracker.</text>
</svg>