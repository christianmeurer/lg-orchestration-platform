<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LG Orchestration &mdash; Live Console</title>
  <!--
    Self-contained SPA: no external CSS/JS dependencies.
    Works when opened directly from disk (file://) with no server.
    Canonical sources: spa/style.css and spa/main.js
  -->
  <style>
/* ── Design tokens ──────────────────────────────────────────── */
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --border:   #30363d;
  --text:     #c9d1d9;
  --muted:    #8b949e;
  --accent:   #58a6ff;
  --ok:       #3fb950;
  --ok2:      #39d353;
  --err:      #f85149;
  --warn:     #d29922;
  color-scheme: dark;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}
/* ── Header bar ───────────────────────────────────────────────*/
#header {
  display: flex; align-items: center; gap: 12px; padding: 0 16px; height: 44px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#header h1 { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; white-space: nowrap; }
#header h1 span { color: var(--accent); }
#run-status-badge {
  font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 12px;
  background: var(--surface2); color: var(--muted); transition: background .2s, color .2s; white-space: nowrap;
}
/* ── Main layout ──────────────────────────────────────────────*/
#layout { display: flex; flex: 1; overflow: hidden; }
/* ── Left sidebar ─────────────────────────────────────────────*/
#sidebar {
  width: 240px; min-width: 180px; border-right: 1px solid var(--border);
  background: var(--surface); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
#sidebar-header {
  padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#run-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.run-item {
  padding: 8px 12px; cursor: pointer; border-left: 3px solid transparent;
  transition: background .1s, border-color .1s;
}
.run-item:hover { background: var(--surface2); }
.run-item.active { background: var(--surface2); border-left-color: var(--accent); }
.run-item-id { font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 11px; color: var(--text); }
.run-item-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
.run-item-ts { font-size: 10px; color: var(--muted); }
/* ── Status badges ────────────────────────────────────────────*/
.badge {
  display: inline-block; padding: 1px 7px; border-radius: 999px;
  font-size: 10px; font-weight: 600; line-height: 18px; white-space: nowrap;
}
.badge-running    { background: #1a3a5c; color: #58a6ff; }
.badge-starting   { background: #1a3a5c; color: #58a6ff; }
.badge-succeeded  { background: #122217; color: #3fb950; }
.badge-failed     { background: #2d1b1b; color: #f85149; }
.badge-suspended  { background: #2d2106; color: #d29922; }
.badge-cancelled  { background: var(--surface2); color: var(--muted); }
.badge-cancelling { background: var(--surface2); color: var(--warn); }
.badge-other      { background: var(--surface2); color: var(--muted); }
/* ── Right panel ──────────────────────────────────────────────*/
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
/* ── Approval banner ──────────────────────────────────────────*/
#approval-banner {
  display: none; background: #2d2106; border-bottom: 1px solid var(--warn);
  padding: 10px 16px; gap: 12px; align-items: center; flex-shrink: 0;
}
#approval-banner.visible { display: flex; }
#approval-text { flex: 1; font-size: 12px; color: var(--warn); }
/* ── Event log panel (top 60%) ────────────────────────────────*/
#event-log-panel {
  flex: 0 0 60%; display: flex; flex-direction: column;
  border-bottom: 1px solid var(--border); overflow: hidden; min-height: 0;
}
#event-log-header {
  padding: 6px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#event-spinner {
  display: none; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); animation: pulse-dot 1s ease-in-out infinite;
}
#event-spinner.active { display: inline-block; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
#event-log {
  flex: 1; overflow-y: auto; padding: 4px 0;
  font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 11px; min-height: 0;
}
#run-complete-banner {
  display: none; padding: 6px 12px; font-size: 12px; font-weight: 600;
  color: var(--ok); background: #122217; border-top: 1px solid var(--border); flex-shrink: 0;
}
#run-complete-banner.visible { display: block; }
/* ── Event rows ───────────────────────────────────────────────*/
.event-row {
  padding: 3px 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
  border-left: 2px solid transparent; display: flex; align-items: baseline; gap: 6px;
}
.event-row:hover { background: var(--surface2); }
.ev-ts   { color: var(--muted); flex-shrink: 0; user-select: none; }
.ev-kind { font-weight: 600; flex-shrink: 0; }
.ev-detail { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-node_start    { border-left-color: #555; }
.event-node_start    .ev-kind { color: #888; }
.event-node_end      { border-left-color: var(--ok); }
.event-node_end      .ev-kind { color: var(--ok); }
.event-llm_chunk     .ev-kind { color: var(--text); }
.event-tool_call     { border-left-color: var(--accent); }
.event-tool_call     .ev-kind { color: var(--accent); }
.event-tool_result   { border-left-color: var(--ok2); }
.event-tool_result   .ev-kind { color: var(--ok2); }
.event-verifier_pass { border-left-color: var(--ok); }
.event-verifier_pass .ev-kind { color: var(--ok); }
.event-verifier_fail { border-left-color: var(--err); }
.event-verifier_fail .ev-kind { color: var(--err); font-weight: 700; }
.event-error         { border-left-color: var(--err); }
.event-error         .ev-kind { color: var(--err); font-weight: 700; }
/* ── Node graph panel (bottom 40%) ───────────────────────────*/
#graph-panel { flex: 0 0 40%; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
#graph-header {
  padding: 6px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#node-graph {
  flex: 1; display: flex; align-items: center; justify-content: flex-start;
  padding: 0 20px; overflow-x: auto; min-height: 0;
}
.pipeline-node { display: flex; align-items: center; flex-shrink: 0; }
.node-box {
  padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 11px; font-weight: 600; color: var(--muted); background: var(--surface2);
  transition: border-color .3s, color .3s, background .3s, box-shadow .3s;
  white-space: nowrap; text-align: center; position: relative;
}
.node-box.active {
  border-color: var(--accent); color: var(--accent); background: #1a2a3a;
  animation: node-pulse 1.2s ease-in-out infinite;
}
.node-box.done { border-color: var(--ok); color: var(--ok); background: #122217; }
@keyframes node-pulse {
  0%, 100% { box-shadow: 0 0 0 0   rgba(88,166,255,.5); }
  50%       { box-shadow: 0 0 0 5px rgba(88,166,255,0);  }
}
.node-check { display: none; margin-left: 5px; color: var(--ok); }
.node-box.done .node-check { display: inline; }
.pipe-arrow { color: var(--border); padding: 0 6px; font-size: 14px; user-select: none; flex-shrink: 0; }
/* ── Buttons ──────────────────────────────────────────────────*/
.btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); cursor: pointer; font-size: 12px; padding: 5px 12px;
  transition: background .12s, border-color .12s; white-space: nowrap;
}
.btn:hover { background: #2d333b; border-color: var(--accent); }
.btn-approve { border-color: var(--ok); color: var(--ok); }
.btn-approve:hover { background: #122217; }
.btn-reject { border-color: var(--err); color: var(--err); }
.btn-reject:hover { background: #2d1b1b; }
/* ── Empty state ──────────────────────────────────────────────*/
#empty-state { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--muted); font-size: 14px; }
/* ── Scrollbars ───────────────────────────────────────────────*/
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9px; }
  </style>
</head>
<body>

<!-- ── Header bar ─────────────────────────────────────────── -->
<div id="header">
  <h1>LG <span>Orchestration</span></h1>
  <span id="run-status-badge">idle</span>
</div>

<!-- ── Main layout ────────────────────────────────────────── -->
<div id="layout">

  <!-- Left sidebar: run history -->
  <div id="sidebar">
    <div id="sidebar-header">Run History</div>
    <div id="run-list">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Right panel: event log + node graph -->
  <div id="main">

    <!-- Approval banner (hidden until approval_requested event) -->
    <div id="approval-banner">
      <span id="approval-text">&#x26A0; Approval required</span>
      <button class="btn btn-approve" onclick="approveRun()">&#x2713; Approve</button>
      <button class="btn btn-reject"  onclick="rejectRun()">&#x2715; Reject</button>
    </div>

    <!-- Empty state shown before any run is selected -->
    <div id="empty-state">Select a run from the sidebar to stream events.</div>

    <!-- Event log (top 60%) — hidden until a run is selected -->
    <div id="event-log-panel">
      <div id="event-log-header">
        Event Log
        <span id="event-spinner" title="Streaming live"></span>
      </div>
      <div id="event-log">
        <!-- rows appended by JS -->
      </div>
      <div id="run-complete-banner">Run complete &#x2713;</div>
    </div>

    <!-- Node graph (bottom 40%) — hidden until a run is selected -->
    <div id="graph-panel">
      <div id="graph-header">Pipeline</div>
      <div id="node-graph">
        <!-- pipeline nodes injected by JS -->
      </div>
    </div>

  </div><!-- #main -->
</div><!-- #layout -->

<script>
'use strict';

// ── Pipeline node names ───────────────────────────────────────
var PIPELINE_NODES = [
  'ingest', 'policy_gate', 'context_builder', 'router',
  'planner', 'coder', 'executor', 'verifier', 'reporter'
];

// ── Application state ─────────────────────────────────────────
var _selectedRunId  = null;
var _activeSSE      = null;
var _completedNodes = new Set();
var _activeNode     = null;
var _listTimer      = null;

// ── Utilities ─────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString(); } catch(_) { return iso; }
}
function statusClass(s) {
  if (s === 'running' || s === 'starting')  return 'running';
  if (s === 'succeeded')                    return 'succeeded';
  if (s === 'failed')                       return 'failed';
  if (s === 'suspended')                    return 'suspended';
  if (s === 'cancelled')                    return 'cancelled';
  if (s === 'cancelling')                   return 'cancelling';
  return 'other';
}

// ── Run history sidebar ───────────────────────────────────────
function refreshRunList() {
  fetch('/v1/runs')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data && Array.isArray(data.runs)) renderRunList(data.runs);
    })
    .catch(function() {});
}

function renderRunList(runs) {
  var el = document.getElementById('run-list');
  if (!el) return;
  var sorted = runs.slice().sort(function(a, b) {
    return (b.created_at || '').localeCompare(a.created_at || '');
  });
  el.innerHTML = sorted.map(function(r) {
    var idSnip = String(r.run_id || '').slice(0, 8);
    var sel    = r.run_id === _selectedRunId ? ' active' : '';
    var cls    = statusClass(r.status);
    var ts     = fmtTime(r.created_at);
    return '<div class="run-item' + sel + '" onclick="selectRun(' + JSON.stringify(r.run_id) + ')">' +
      '<div class="run-item-id">' + esc(idSnip) + '&hellip;</div>' +
      '<div class="run-item-meta">' +
        '<span class="badge badge-' + cls + '">' + esc(r.status) + '</span>' +
        '<span class="run-item-ts">' + esc(ts) + '</span>' +
      '</div>' +
      '</div>';
  }).join('');
}

// ── Run selection & SSE stream ────────────────────────────────
function selectRun(runId) {
  _selectedRunId = runId;
  if (_activeSSE) { _activeSSE.close(); _activeSSE = null; }

  _completedNodes = new Set();
  _activeNode = null;
  clearEventLog();
  resetNodeGraph();
  hideBanner();
  hideCompleteBanner();
  updateStatusBadge('connecting\u2026');
  refreshRunList();

  // Show panels, hide empty state
  var empty = document.getElementById('empty-state');
  if (empty) empty.style.display = 'none';
  var logPanel = document.getElementById('event-log-panel');
  if (logPanel) logPanel.style.display = 'flex';
  var graphPanel = document.getElementById('graph-panel');
  if (graphPanel) graphPanel.style.display = 'flex';

  var url = '/runs/' + encodeURIComponent(runId) + '/stream';
  var es = new EventSource(url);
  _activeSSE = es;

  es.onmessage = function(ev) {
    try { handleSSEEvent(JSON.parse(ev.data)); } catch(_) {}
  };
  es.onerror = function() {
    es.close(); _activeSSE = null;
    showSpinner(false); updateStatusBadge('disconnected');
  };
}

function handleSSEEvent(event) {
  // Done sentinel
  if (event.type === 'done') {
    if (_activeSSE) { _activeSSE.close(); _activeSSE = null; }
    showSpinner(false);
    showCompleteBanner();
    if (_activeNode) {
      var el = document.getElementById('node-' + _activeNode);
      if (el) { el.classList.remove('active'); el.classList.add('done'); }
      _activeNode = null;
    }
    refreshRunList();
    return;
  }
  // Server error
  if (event.error) {
    appendEventRow({ kind: 'error', ts_ms: Date.now(), data: { message: event.error } });
    showSpinner(false);
    return;
  }
  // Approval requested
  if (event.type === 'approval_requested' || event.kind === 'approval_requested') {
    var summary = event.summary || (event.data && event.data.summary) || 'Approval required';
    showApprovalBanner(summary);
    return;
  }
  // Full run payload (replayed for completed runs)
  if ('status' in event && 'run_id' in event) {
    updateStatusBadge(event.status || '?');
    if (event.pending_approval) showApprovalBanner(event.pending_approval_summary || 'Approval required');
    return;
  }
  // Normal trace event
  if (event.kind) {
    appendEventRow(event);
    handleNodeEvent(event);
    showSpinner(true);
    updateStatusBadge('running');
  }
}

// ── Event log ─────────────────────────────────────────────────
function appendEventRow(event) {
  var log = document.getElementById('event-log');
  if (!log) return;
  var kind   = String(event.kind || 'event');
  var tsMs   = event.ts_ms || Date.now();
  var ts     = new Date(tsMs).toISOString().slice(11, 19);
  var data   = event.data || {};
  var detail = '';
  if (data.name)         detail = data.name;
  else if (data.text)    detail = String(data.text).slice(0, 120);
  else if (data.message) detail = String(data.message).slice(0, 120);
  else if (data.tool)    detail = data.tool;
  var kindCls = kind.replace(/[^a-z_]/g, '_');
  var row = document.createElement('div');
  row.className = 'event-row event-' + kindCls;
  row.innerHTML =
    '<span class="ev-ts">' + esc(ts) + '</span>' +
    '<span class="ev-kind">' + esc(kind) + '</span>' +
    '<span class="ev-detail">' + esc(detail) + '</span>';
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
}

function clearEventLog() {
  var log = document.getElementById('event-log');
  if (log) log.innerHTML = '';
}

function showSpinner(on) {
  var el = document.getElementById('event-spinner');
  if (el) el.classList.toggle('active', on);
}

function updateStatusBadge(status) {
  var el = document.getElementById('run-status-badge');
  if (el) el.textContent = status;
}

function showCompleteBanner() {
  var el = document.getElementById('run-complete-banner');
  if (el) el.classList.add('visible');
}

function hideCompleteBanner() {
  var el = document.getElementById('run-complete-banner');
  if (el) el.classList.remove('visible');
}

// ── Node graph ────────────────────────────────────────────────
function buildNodeGraph() {
  var el = document.getElementById('node-graph');
  if (!el) return;
  el.innerHTML = PIPELINE_NODES.map(function(name, i) {
    return '<div class="pipeline-node">' +
      (i > 0 ? '<span class="pipe-arrow">&rarr;</span>' : '') +
      '<div class="node-box" id="node-' + esc(name) + '">' +
        esc(name) + '<span class="node-check"> &#x2713;</span>' +
      '</div>' +
      '</div>';
  }).join('');
}

function resetNodeGraph() {
  PIPELINE_NODES.forEach(function(name) {
    var el = document.getElementById('node-' + name);
    if (el) { el.classList.remove('active', 'done'); }
  });
}

function handleNodeEvent(event) {
  var kind = String(event.kind || '');
  var data = event.data || {};
  var nodeName = String(data.name || '').toLowerCase();
  if (!nodeName || PIPELINE_NODES.indexOf(nodeName) === -1) return;
  if (kind === 'node_start') {
    if (_activeNode && _activeNode !== nodeName) {
      var prev = document.getElementById('node-' + _activeNode);
      if (prev) prev.classList.remove('active');
    }
    _activeNode = nodeName;
    var el = document.getElementById('node-' + nodeName);
    if (el) { el.classList.remove('done'); el.classList.add('active'); }
  } else if (kind === 'node_end') {
    var el2 = document.getElementById('node-' + nodeName);
    if (el2) { el2.classList.remove('active'); el2.classList.add('done'); }
    _completedNodes.add(nodeName);
    if (_activeNode === nodeName) _activeNode = null;
  }
}

// ── Approval banner ───────────────────────────────────────────
function showApprovalBanner(summary) {
  var banner = document.getElementById('approval-banner');
  var text   = document.getElementById('approval-text');
  if (banner) banner.classList.add('visible');
  if (text)   text.textContent = '\u26A0 ' + summary;
}

function hideBanner() {
  var el = document.getElementById('approval-banner');
  if (el) el.classList.remove('visible');
}

function approveRun() {
  if (!_selectedRunId) return;
  fetch('/runs/' + encodeURIComponent(_selectedRunId) + '/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ actor: 'spa' })
  })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      hideBanner();
      if (data && data.run_id) selectRun(data.run_id);
    })
    .catch(function() {});
}

function rejectRun() {
  if (!_selectedRunId) return;
  fetch('/runs/' + encodeURIComponent(_selectedRunId) + '/reject', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ actor: 'spa' })
  })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function() { hideBanner(); refreshRunList(); updateStatusBadge('rejected'); })
    .catch(function() {});
}

// ── Bootstrap ─────────────────────────────────────────────────
function init() {
  buildNodeGraph();
  var logPanel   = document.getElementById('event-log-panel');
  var graphPanel = document.getElementById('graph-panel');
  if (logPanel)   logPanel.style.display   = 'none';
  if (graphPanel) graphPanel.style.display = 'none';
  refreshRunList();
  _listTimer = setInterval(refreshRunList, 5000);
}

// Expose for HTML onclick attributes
window.selectRun  = selectRun;
window.approveRun = approveRun;
window.rejectRun  = rejectRun;

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
