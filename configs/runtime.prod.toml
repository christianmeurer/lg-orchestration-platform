# Model selection — override via env vars without rebuilding:
#   LG_PLANNER_PROVIDER, LG_PLANNER_MODEL
#   LG_ROUTER_PROVIDER, LG_ROUTER_MODEL
# Available DO models: openai/gpt-4.1, openai/gpt-4o-mini, openai/gpt-5,
#   meta-llama/Meta-Llama-3.3-70B-Instruct, anthropic-claude-4.6-sonnet

[models.router]
provider = "digitalocean"
model = "anthropic-claude-4.6-sonnet"
temperature = 1.0

[models.planner]
provider = "digitalocean"
model = "anthropic-claude-4.6-sonnet"
temperature = 1.0

[models.coder]
provider = "digitalocean"
model = "anthropic-claude-4.6-sonnet"
temperature = 1.0

[models.reporter]
provider = "digitalocean"
model = "anthropic-claude-4.6-sonnet"
temperature = 1.0

[models.routing]
local_provider = "local"
fallback_task_classes = ["summarization", "lint_reflection", "context_condensation"]

[models.digitalocean]
base_url = "https://inference.do-ai.run/v1"
timeout_s = 30

[models.openai_compatible]
base_url = "https://api.openai.com/v1"
timeout_s = 60

[budgets]
max_loops = 3
max_tool_calls_per_loop = 12
max_patch_bytes = 200000
tool_timeout_s = 60
stable_prefix_tokens = 12000
working_set_tokens = 8000
tool_result_summary_chars = 800

[policy]
network_default = "deny"
require_approval_for_mutations = false
allowed_write_paths = ["py/**", "rs/**", "docs/**", "prompts/**", "schemas/**", "configs/**", "eval/**", "scripts/**", ".github/**"]

[runner]
base_url = "http://runner:8088"
root_dir = "."

[mcp]
enabled = false

[trace]
enabled = true
output_dir = "artifacts/runs"

[checkpoint]
enabled = true
db_path = "artifacts/checkpoints/langgraph.sqlite"
namespace = "main"
thread_prefix = "lg-orch"
backend = "sqlite"
redis_url = "redis://redis:6379/0"  # override via LG_CHECKPOINT_REDIS_URL env var for custom endpoints
postgres_dsn = ""
redis_ttl_seconds = 86400

[remote_api]
auth_mode = "bearer"
allow_unauthenticated_healthz = true
trust_forwarded_headers = false
access_log_enabled = true
run_store_path = "artifacts/remote-api/runs.sqlite"
rate_limit_rps = 60
procedure_cache_path = "artifacts/remote-api/procedures.sqlite"
default_namespace = ""
  
[vericoding]  
enabled = true  
extensions = [".rs"] 
