image:
  repository: registry.digitalocean.com/lula-orch/lula-orch
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: docr-secret

# Orchestrator Configuration
orchestrator:
  replicaCount: 2
  profile: "prod"
  routerModel: "anthropic-claude-4.6-sonnet"
  plannerModel: "anthropic-claude-4.6-sonnet"
  coderModel: "anthropic-claude-4.6-sonnet"
  reporterModel: "anthropic-claude-4.6-sonnet"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: LoadBalancer
    port: 80

# Runner Configuration
runner:
  replicaCount: 1
  gvisor:
    enabled: true  # Set to false if gVisor pool has insufficient capacity
  workspace:
    persistent: false  # Set to true to use PVC instead of emptyDir
    storageClass: "do-block-storage"
    size: "10Gi"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  service:
    type: ClusterIP
    port: 8088

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "LULA_AFFINITY"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    nginx.ingress.kubernetes.io/session-cookie-change-on-failure: "true"
  hosts:
    - host: lula.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: lula-tls
      hosts:
        - lula.example.com

# Secrets Configuration
secrets:
  remoteApiBearerToken: ""
  runnerApiKey: "dev-insecure"
  digitalOceanModelAccessKey: ""
  checkpointRedisUrl: ""
  checkpointPostgresDsn: ""
  hmacSecret: ""
