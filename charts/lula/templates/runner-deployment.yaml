apiVersion: apps/v1
kind: Deployment
metadata:
  name: lula-runner
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: lula-runner
  template:
    metadata:
      labels:
        app: lula-runner
    spec:
      {{- if .Values.runner.gvisor.enabled }}
      runtimeClassName: gvisor
      nodeSelector:
        sandbox: gvisor
      tolerations:
        - key: sandbox
          operator: Equal
          value: gvisor
          effect: NoSchedule
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/rs/target/release/lg-runner", "--bind", "0.0.0.0:8088", "--root-dir", "/app", "--profile", "prod"]
          ports:
            - containerPort: 8088
          envFrom:
            - secretRef:
                name: lula-secrets
          env:
            - name: LG_RUN_TIMEOUT_SECS
              value: "600"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml .Values.runner.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: work-dir
              mountPath: /workspace
            - name: tmp-dir
              mountPath: /tmp
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: work-dir
          {{- if .Values.runner.workspace.persistent }}
          persistentVolumeClaim:
            claimName: lula-workspace
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp-dir
          emptyDir: {}
