apiVersion: v1
kind: Service
metadata:
  name: lula-orch
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.orchestrator.service.type }}
  ports:
    - port: {{ .Values.orchestrator.service.port }}
      targetPort: 8001
      protocol: TCP
      name: http
  selector:
    app: lula-orch
