{{- if .Values.runner.gvisor.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-installer
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: gvisor-installer
  template:
    metadata:
      labels:
        app: gvisor-installer
    spec:
      nodeSelector:
        sandbox: gvisor
      tolerations:
        - key: sandbox
          operator: Equal
          value: gvisor
          effect: NoSchedule
      initContainers:
        - name: installer
          image: ubuntu:22.04
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              INSTALL_DIR="/host/usr/local/sbin"
              RUNSC_BIN="${INSTALL_DIR}/runsc"
              SHIM_BIN="${INSTALL_DIR}/containerd-shim-runsc-v1"

              # Idempotency check: skip download if binaries already exist
              SKIP_DOWNLOAD=0
              if [ -f "${RUNSC_BIN}" ] && [ -f "${SHIM_BIN}" ]; then
                echo "runsc and containerd-shim-runsc-v1 already installed, skipping download"
                SKIP_DOWNLOAD=1
              fi

              if [ "${SKIP_DOWNLOAD}" = "0" ]; then
                echo "Downloading gVisor binaries..."
                apt-get update -qq && apt-get install -y -qq curl util-linux
                curl -fsSL https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/runsc \
                  -o "${RUNSC_BIN}"
                rm -f "${SHIM_BIN}"
                curl -fsSL https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/containerd-shim-runsc-v1 \
                  -o "${SHIM_BIN}"
                chmod 755 "${RUNSC_BIN}"
                chmod 755 "${SHIM_BIN}"
                echo "gVisor runtime binaries installed on the host."
              fi

              # Always ensure containerd config is correct
              NEED_RESTART=0
              if ! grep -q 'io.containerd.runsc.v1' /host/etc/containerd/config.toml 2>/dev/null; then
                echo "" >> /host/etc/containerd/config.toml
                echo "[plugins.\"io.containerd.grpc.v1.cri\".containerd.runtimes.runsc]" >> /host/etc/containerd/config.toml
                echo "  runtime_type = \"io.containerd.runsc.v1\"" >> /host/etc/containerd/config.toml
                NEED_RESTART=1
              fi

              # Restart containerd only if config changed or binary was newly installed
              if [ "${SKIP_DOWNLOAD}" = "0" ] || [ "${NEED_RESTART}" -eq 1 ]; then
                echo "Restarting containerd on the host to activate the runsc runtime..."
                nsenter --target 1 --mount --uts --ipc --pid -- systemctl restart containerd
                echo "containerd restarted successfully."
              else
                echo "containerd config already contains runsc entry; skipping restart."
              fi

              echo "gVisor installer complete"
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          command: ["/pause"]
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
{{- end }}
