# HPA for the Python orchestrator Deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lula-orchestrator-hpa
  namespace: lula-orch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lula-orch   # matches metadata.name in infra/k8s/deployment.yaml
  minReplicas: {{ .Values.orchestrator.hpa.minReplicas | default 1 }}
  maxReplicas: {{ .Values.orchestrator.hpa.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.orchestrator.hpa.cpuTargetUtilization | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.orchestrator.hpa.memoryTargetUtilization | default 80 }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.orchestrator.hpa.scaleDownStabilization | default 300 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
# HPA for the Rust runner Deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lula-runner-hpa
  namespace: lula-orch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lula-runner   # matches metadata.name in infra/k8s/runner-deployment.yaml
  minReplicas: {{ .Values.runner.hpa.minReplicas | default 1 }}
  maxReplicas: {{ .Values.runner.hpa.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.runner.hpa.cpuTargetUtilization | default 60 }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.runner.hpa.scaleDownStabilization | default 180 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
