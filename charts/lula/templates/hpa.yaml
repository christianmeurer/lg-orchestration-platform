# HPA for the Python orchestrator Deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lula-orchestrator-hpa
  namespace: lula-orch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lula-orch   # matches metadata.name in infra/k8s/deployment.yaml
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
# HPA for the Rust runner Deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lula-runner-hpa
  namespace: lula-orch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lula-runner   # matches metadata.name in infra/k8s/runner-deployment.yaml
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
