apiVersion: apps/v1
kind: Deployment
metadata:
  name: lula-orch
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app: lula-orch
  template:
    metadata:
      labels:
        app: lula-orch
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: orchestrator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/py/.venv/bin/python", "-m", "lg_orch", "serve", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: lula-secrets
          env:
            - name: LG_PROFILE
              value: {{ .Values.orchestrator.profile | quote }}
            - name: LG_RUNNER_BASE_URL
              value: "http://lula-runner:8088"
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
