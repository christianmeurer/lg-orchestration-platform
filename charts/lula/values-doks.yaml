# DOKS deployment values — DigitalOcean Kubernetes
# Usage: helm install lula charts/lula -f charts/lula/values-doks.yaml

image:
  repository: registry.digitalocean.com/lula-orch/lula
  pullPolicy: Always
  tag: "v1.1.0"

imagePullSecrets:
  - name: registry-lula-orch

orchestrator:
  replicaCount: 1  # Start with 1 to save cost, HPA scales up
  profile: "prod"
  routerModel: "anthropic-claude-4.6-sonnet"
  plannerModel: "anthropic-claude-4.6-sonnet"
  coderModel: "anthropic-claude-4.6-sonnet"
  reporterModel: "anthropic-claude-4.6-sonnet"
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 80

runner:
  replicaCount: 1
  gvisor:
    enabled: false  # DOKS default pool doesn't have gVisor runtime
  workspace:
    persistent: false
    storageClass: "do-block-storage"
    size: "10Gi"
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: 1500m
      memory: 1536Mi
  service:
    type: ClusterIP
    port: 8088

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: lula.eiv.eng.br
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: lula-tls
      hosts:
        - lula.eiv.eng.br

secrets:
  remoteApiBearerToken: "5RDK5shDpRMr_2htK5poMfl0NcX2rHqviCPqJFNJSw4"
  runnerApiKey: "doks-deploy-key"
  digitalOceanModelAccessKey: ""
  checkpointRedisUrl: ""
  checkpointPostgresDsn: ""
  hmacSecret: "doks-hmac-secret"
